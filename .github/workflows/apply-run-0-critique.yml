name: Apply Run 0 critique amendments

on:
  push:
    branches:
      - agent/six-year-old-test-run-0
    paths:
      - run-0-amendments.ready
  workflow_dispatch:

permissions:
  contents: write

jobs:
  amend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/six-year-old-test-run-0

      - name: Apply bounded methodology amendments
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          calibration_path = Path('data/test/calibration-run-0.json')
          calibration = json.loads(calibration_path.read_text())
          for checkpoint in calibration['pathwayCheckpoints']:
              if checkpoint.get('metricId') == 'education_language_alignment':
                  checkpoint['label'] = 'Estimated access to education in a language understood'
          calibration['methodologyStatus']['proxyDimensionsMayContributeToCalibration'] = True
          calibration['methodologyStatus']['proxyDimensionsMaySatisfyOfficialPass'] = False
          calibration_path.write_text(json.dumps(calibration, indent=2, ensure_ascii=False) + '\n')

          registry_path = Path('data/test/metric-registry.json')
          registry = json.loads(registry_path.read_text())
          registry['scoring']['proxyDimensionsMayContributeToCalibration'] = True
          registry['scoring']['proxyDimensionsMaySatisfyOfficialPass'] = False
          registry_path.write_text(json.dumps(registry, indent=2, ensure_ascii=False) + '\n')

          methodology_path = Path('docs/six-year-old-test-methodology.md')
          methodology = methodology_path.read_text()
          anchor = 'Unknown values remain unknown.\n'
          addition = ('Unknown values remain unknown.\n\n'
                      'Proxy dimensions may contribute to a calibration index, but they cannot independently satisfy an official pass condition.\n')
          if 'Proxy dimensions may contribute to a calibration index' not in methodology:
              methodology = methodology.replace(anchor, addition)
          methodology_path.write_text(methodology)
          PY

          rm -f run-0-amendments.ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/test/calibration-run-0.json data/test/metric-registry.json docs/six-year-old-test-methodology.md run-0-amendments.ready
          git commit -m "Clarify Run 0 proxy methodology"
          git push
