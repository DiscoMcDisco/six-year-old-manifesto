name: Promote Official Run 1

on:
  push:
    branches:
      - agent/six-year-old-test-run-0
    paths:
      - official-run-1.ready
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/six-year-old-test-run-0

      - name: Promote the Test to Official Run 1
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          def replace_all(path, replacements):
              p = Path(path)
              text = p.read_text()
              for old, new in replacements:
                  if old not in text:
                      raise RuntimeError(f"Expected text not found in {path}: {old}")
                  text = text.replace(old, new)
              p.write_text(text)

          replace_all('test.html', [
              ('Calibration Run 0 of the Six-Year-Old Test:', 'Official Run 1 of the Six-Year-Old Test:'),
              ('Six-Year-Old Test · Calibration Run 0', 'Six-Year-Old Test · Official Run 1'),
              ('Calibration research completed', 'Official research completed'),
              ('<span class="status pressure">Calibration only</span>', '<span class="status pressure">Official result</span>'),
              ('<p>Five measurable or proxy dimensions. Three critical dimensions remain unknown.</p>', '<p>Five measured or proxy dimensions. Three critical dimensions remain unknown.</p>'),
              ('<div><small>Safe child AI path</small><strong>Not global</strong></div>\n      </div>', '<div><small>Safe child AI path</small><strong>Not global</strong></div>\n        <div><small>Official runs</small><strong data-total-runs>1</strong></div>\n      </div>'),
              ('<div class="kicker">What Run 0 found</div>', '<div class="kicker">What Run 1 found</div>'),
              ('<div class="kicker">Calibration complete</div>', '<div class="kicker">Official Run 1 complete</div>'),
              ('Run 0 gives us a defensible static result and a deliberately small quarterly payload. The next work is to challenge the weights, design the missing benchmarks and make this infographic the living pulse of the Manifesto.', 'Official Run 1 establishes the first defensible world snapshot and a deliberately small quarterly payload. Future accepted runs can update the evidence without redesigning the Test.'),
              ('The Six-Year-Old Test · Calibration Run 0 · 16 July 2026', 'The Six-Year-Old Test · Official Run 1 · 16 July 2026')
          ])

          replace_all('scripts/test.js', [
              ("result: 'data/test/calibration-run-0.json'", "result: 'data/test/current-result.json'"),
              ("toast.textContent = `Current safe result loaded · ${formatDate(result.safeResearchCompleted)}`;", "toast.textContent = `Official Run ${result.runNumber} loaded · ${formatDate(result.safeResearchCompleted)}`;"),
              ("title: 'The Six-Year-Old Test · Calibration Run 0'", "title: 'The Six-Year-Old Test · Official Run 1'"),
              ("document.querySelector('[data-next-date]').textContent = formatDate(result.nextRefreshEligible);", "document.querySelector('[data-next-date]').textContent = formatDate(result.nextRefreshEligible);\n    document.querySelector('[data-total-runs]').textContent = result.totalRuns;"),
              ("toast.textContent = 'The calibration data could not be loaded.';", "toast.textContent = 'The Test data could not be loaded.';")
          ])

          replace_all('styles/test.css', [
              ('.verdict-strip-grid { display: grid; grid-template-columns: repeat(4, 1fr); }', '.verdict-strip-grid { display: grid; grid-template-columns: repeat(5, 1fr); }'),
              ('  .verdict-strip-grid > div:nth-child(n+3) { border-top: 1px solid var(--line); }', '  .verdict-strip-grid > div:nth-child(n+3) { border-top: 1px solid var(--line); }\n  .verdict-strip-grid > div:last-child { grid-column: 1 / -1; border-left: 0; }')
          ])

          old_result = Path('data/test/calibration-run-0.json')
          result = json.loads(old_result.read_text())
          result['version'] = '1.0.0'
          result['runId'] = 'run-1-2026-07-16'
          result['runNumber'] = 1
          result['totalRuns'] = 1
          result['runType'] = 'official_world_test'
          result['officialQuarterlyResult'] = True
          result['resultStatus'] = 'official'
          result['measuredSubstrate']['status'] = 'official_run_value'
          status = result['methodologyStatus']
          status['metricRegistry'] = 'official_v1'
          status['weights'] = 'official_v1'
          status['passThresholds'] = 'official_v1'
          status['quarterlyAutomation'] = 'next_eligible_run_pending_trigger'
          status['proxyDimensionsMayContributeToCurrentIndex'] = status.pop('proxyDimensionsMayContributeToCalibration')
          Path('data/test/current-result.json').write_text(json.dumps(result, indent=2, ensure_ascii=False) + '\n')
          old_result.unlink()

          evidence_path = Path('data/test/evidence-ledger.json')
          evidence = json.loads(evidence_path.read_text())
          evidence['version'] = '1.0.0'
          evidence['runId'] = 'run-1-2026-07-16'
          evidence['runNumber'] = 1
          evidence_path.write_text(json.dumps(evidence, indent=2, ensure_ascii=False) + '\n')

          registry_path = Path('data/test/metric-registry.json')
          registry = json.loads(registry_path.read_text())
          registry['version'] = '1.0.0'
          registry['status'] = 'official'
          scoring = registry['scoring']
          scoring['passRuleStatus'] = 'official_v1'
          scoring['proxyDimensionsMayContributeToCurrentIndex'] = scoring.pop('proxyDimensionsMayContributeToCalibration')
          registry['runCounting'] = {
              'initialOfficialRun': 1,
              'incrementRule': 'Increment totalRuns exactly once when a new eligible research result is validated and approved as the safe published result.',
              'minimumBoundaryDays': 90
          }
          registry_path.write_text(json.dumps(registry, indent=2, ensure_ascii=False) + '\n')

          replace_all('docs/six-year-old-test-methodology.md', [
              ('## Calibration status', '## Official Run 1'),
              ('Run 0 is a calibration exercise, not an official quarterly result.', 'Official Run 1 was completed on 16 July 2026 and establishes the first published world snapshot.'),
              ('## What the calibration score means', '## What the score means'),
              ('The Measured Enabling Substrate is a provisional composite of five dimensions for which global measures or explicit proxies currently exist:', 'The Measured Enabling Substrate is a composite of five dimensions for which global measures or explicit proxies currently exist:'),
              ('Within each scored dimension, the current calibration uses the arithmetic mean of its scored metrics.', 'Within each scored dimension, the current Test uses the arithmetic mean of its scored metrics.'),
              ('Proxy dimensions may contribute to a calibration index, but they cannot independently satisfy an official pass condition.', 'Proxy dimensions may contribute to the current index, but they cannot independently satisfy an official pass condition.'),
              ('The expensive work belongs in the first calibration. Routine runs should be small evidence updates.', 'The expensive work belongs in the first full research run. Routine runs should be small evidence updates.')
          ])
          methodology = Path('docs/six-year-old-test-methodology.md')
          text = methodology.read_text()
          text = text.replace('## Quarterly run\n', '## Run counting and quarterly boundary\n\nOfficial Run 1 sets `totalRuns` to 1. Each later result increments the count exactly once, only after the 90-day boundary has passed, the Test is triggered, the evidence is validated and the result is approved for publication.\n\n## Quarterly run\n')
          methodology.write_text(text)

          replace_all('README.md', [
              ('Six-Year-Old Test calibration dashboard', 'Six-Year-Old Test official results dashboard'),
              ('metric registry, evidence ledger, calibration result and quarterly payload schema', 'metric registry, evidence ledger, current official result and quarterly payload schema'),
              ('Version 0.1, dated 16 July 2026. Calibration Run 0 of the Six-Year-Old Test is implemented on a working branch and remains subject to review before publication.', 'Version 1.0, dated 16 July 2026. Official Run 1 of the Six-Year-Old Test is published with a 90-day minimum boundary before the next eligible run.')
          ])

          schema_path = Path('data/test/quarterly-run.schema.json')
          schema = json.loads(schema_path.read_text())
          schema['title'] = 'Six-Year-Old Test Scheduled Research Payload'
          schema['required'].insert(1, 'runNumber')
          schema['required'].insert(6, 'previousRunNumber')
          props = schema['properties']
          ordered = {}
          for key, value in props.items():
              ordered[key] = value
              if key == 'runId':
                  ordered['runNumber'] = {'type': 'integer', 'minimum': 2}
              if key == 'previousRunId':
                  ordered['previousRunNumber'] = {'type': 'integer', 'minimum': 1}
          ordered['runId']['pattern'] = '^run-[0-9]+-[0-9]{4}-[0-9]{2}-[0-9]{2}$'
          ordered['runType'] = {'const': 'scheduled_world_test_update'}
          schema['properties'] = ordered
          schema_path.write_text(json.dumps(schema, indent=2, ensure_ascii=False) + '\n')

          remaining = []
          for path in Path('.').rglob('*'):
              if path.is_file() and '.git' not in path.parts and path.name != 'promote-official-run.yml':
                  try:
                      text = path.read_text()
                  except UnicodeDecodeError:
                      continue
                  if 'calibration' in text.lower():
                      remaining.append(str(path))
          if remaining:
              raise RuntimeError(f'Remaining calibration terminology: {remaining}')
          PY

          rm -f official-run-1.ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Promote Six-Year-Old Test to Official Run 1"
          git push