name: Bootstrap Test Run 0

on:
  push:
    branches:
      - agent/six-year-old-test-run-0
    paths:
      - site.ready
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish calibration dashboard
        shell: bash
        run: |
          cat run0.tar.xz.b64.part* | base64 --decode > run0.tar.xz
          rm -rf .bootstrap
          mkdir .bootstrap
          tar -xJf run0.tar.xz -C .bootstrap
          cp -R .bootstrap/manifesto-run0/. .
          rm -rf .bootstrap run0.tar.xz site.ready run0.tar.xz.b64.part*
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build Six-Year-Old Test calibration dashboard"
          git push
